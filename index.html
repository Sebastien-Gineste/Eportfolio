<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Software engineer ePortfolio." />
    <title>ePortfolio</title>

    <!--
      Restore the deep-linked path stored by public/404.html before the app
      boots. This makes client-side routing work on GitHub Pages refreshes.
      See the README ("GitHub Pages") for the full explanation.
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>

    <!-- Prevent the browser from jumping to a hash before React measures layout. -->
    <script>
      (function () {
        if (location.hash) {
          history.scrollRestoration = 'manual';
          window.scrollTo(0, 0);
        }
      })();
    </script>

    <!--
      Apply the persisted (or system-preferred) theme before the first paint to
      avoid a flash of the wrong color scheme (FOUC).
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {
          /* localStorage may be unavailable; fall back to the default theme. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
