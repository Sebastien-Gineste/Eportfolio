<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;

        var l = window.location;
        var basePath =
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') + '/';
        var rest = l.pathname.slice(basePath.length);

        sessionStorage.redirect = l.origin + basePath + rest + l.search + l.hash;
        l.replace(l.origin + basePath);
      })();
    </script>
  </head>
  <body></body>
</html>
